<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Tablet Tilt Platformer</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #1e2f4d 0%, #0a1020 100%);
        font-family: Arial, Helvetica, sans-serif;
        color: #eef3ff;
        touch-action: manipulation;
      }
      main { text-align: center; padding: 12px; }
      h1 { margin-bottom: 8px; }
      p { margin: 6px 0; }
      a { color: #9fd4ff; }
      button {
        margin-top: 8px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #8bb7ec;
        background: #23456d;
        color: #fff;
        font-size: 15px;
      }
      canvas {
        display: block;
        margin-top: 12px;
        border: 2px solid #9ec4ff;
        background: linear-gradient(180deg, #2f4d73 0%, #12253d 65%, #0f1a2f 100%);
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45);
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tablet Tilt Platformer</h1>
      <p>Tilt device left/right to move. Tap and hold to jump higher.</p>
      <p>Works best on tablets and smartphones with accelerometer.</p>
      <p><a href="/index.html">← Back to Index</a></p>
      <button id="motionBtn">Enable motion controls</button>
      <p id="status">Motion: waiting for permission</p>
      <canvas id="gameCanvas" width="900" height="440"></canvas>
    </main>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const statusEl = document.getElementById('status');
      const motionBtn = document.getElementById('motionBtn');

      const WORLD_WIDTH = 2600;
      const GRAVITY = 1800;
      const MAX_MOVE_SPEED = 360;
      const JUMP_SPEED = 770;
      const MAX_TILT_DEG = 30;

      const player = { x: 80, y: 220, w: 28, h: 28, vx: 0, vy: 0, onGround: false };
      let tiltGamma = 0;
      let jumpPressed = false;
      let levelComplete = false;
      let cameraX = 0;

      const platforms = [
        { x: 0, y: 394, w: 300, h: 46 },
        { x: 220, y: 332, w: 150, h: 20 },
        { x: 470, y: 278, w: 160, h: 20 },
        { x: 690, y: 228, w: 170, h: 20 },
        { x: 980, y: 300, w: 180, h: 20 },
        { x: 1240, y: 256, w: 140, h: 20 },
        { x: 1460, y: 214, w: 180, h: 20 },
        { x: 1740, y: 270, w: 200, h: 20 },
        { x: 2060, y: 330, w: 180, h: 20 },
        { x: WORLD_WIDTH - 260, y: 394, w: 260, h: 46 },
      ];

      const finishPlatform = platforms[platforms.length - 1];

      function intersects(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function resetPlayer() {
        if (levelComplete) return;
        player.x = 80;
        player.y = 220;
        player.vx = 0;
        player.vy = 0;
      }

      function setJumpDown(isDown) {
        if (isDown) {
          if (!jumpPressed && player.onGround && !levelComplete) {
            player.vy = -JUMP_SPEED;
            player.onGround = false;
          }
          jumpPressed = true;
        } else {
          if (jumpPressed && player.vy < 0) {
            player.vy *= 0.5;
          }
          jumpPressed = false;
        }
      }

      function onDeviceOrientation(event) {
        if (typeof event.gamma !== 'number') return;
        tiltGamma = Math.max(-MAX_TILT_DEG, Math.min(MAX_TILT_DEG, event.gamma));
        statusEl.textContent = `Motion: active (tilt ${tiltGamma.toFixed(1)}°)`;
      }

      async function enableMotion() {
        if (typeof DeviceOrientationEvent === 'undefined') {
          statusEl.textContent = 'Motion: not supported on this device/browser';
          return;
        }

        try {
          if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const result = await DeviceOrientationEvent.requestPermission();
            if (result !== 'granted') {
              statusEl.textContent = 'Motion: permission denied';
              return;
            }
          }

          window.addEventListener('deviceorientation', onDeviceOrientation, { passive: true });
          statusEl.textContent = 'Motion: enabled, tilt your device';
          motionBtn.hidden = true;
        } catch (err) {
          statusEl.textContent = 'Motion: failed to start';
        }
      }

      motionBtn.addEventListener('click', enableMotion);

      const pointerTarget = document.body;
      pointerTarget.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        setJumpDown(true);
      }, { passive: false });
      pointerTarget.addEventListener('pointerup', () => setJumpDown(false));
      pointerTarget.addEventListener('pointercancel', () => setJumpDown(false));
      pointerTarget.addEventListener('pointerleave', () => setJumpDown(false));

      function update(dt) {
        if (levelComplete) return;

        const moveFactor = tiltGamma / MAX_TILT_DEG;
        player.vx = moveFactor * MAX_MOVE_SPEED;
        player.x += player.vx * dt;
        player.x = Math.max(0, Math.min(WORLD_WIDTH - player.w, player.x));

        player.vy += GRAVITY * dt;
        player.y += player.vy * dt;
        player.onGround = false;

        for (const platform of platforms) {
          if (!intersects(player, platform)) continue;

          const prevBottom = player.y - player.vy * dt + player.h;
          const prevTop = player.y - player.vy * dt;
          const prevRight = player.x - player.vx * dt + player.w;
          const prevLeft = player.x - player.vx * dt;

          if (prevBottom <= platform.y) {
            player.y = platform.y - player.h;
            player.vy = 0;
            player.onGround = true;
            if (platform === finishPlatform) {
              levelComplete = true;
              jumpPressed = false;
            }
          } else if (prevTop >= platform.y + platform.h) {
            player.y = platform.y + platform.h;
            player.vy = 0;
          } else if (prevRight <= platform.x) {
            player.x = platform.x - player.w;
          } else if (prevLeft >= platform.x + platform.w) {
            player.x = platform.x + platform.w;
          }
        }

        if (player.y > canvas.height + 150) {
          resetPlayer();
        }

        const targetCamera = player.x - canvas.width * 0.35;
        cameraX = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, targetCamera));
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-cameraX, 0);

        ctx.fillStyle = '#4f6c93';
        for (let i = 0; i < WORLD_WIDTH; i += 80) {
          ctx.fillRect(i, 0, 2, canvas.height);
        }

        ctx.fillStyle = '#7089ad';
        for (const platform of platforms) {
          ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
        }

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(player.x, player.y, player.w, player.h);

        ctx.restore();

        ctx.fillStyle = '#d9e6ff';
        ctx.font = '16px Arial';
        ctx.fillText('Tilt to move. Tap & hold to jump higher. Reach the final platform.', 16, 26);

        if (levelComplete) {
          ctx.fillStyle = 'rgba(7, 14, 24, 0.6)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#d8f7a1';
          ctx.font = 'bold 42px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('You Win!', canvas.width / 2, canvas.height / 2 - 8);
          ctx.font = '20px Arial';
          ctx.fillStyle = '#ecf7ff';
          ctx.fillText('Refresh to play again', canvas.width / 2, canvas.height / 2 + 28);
          ctx.textAlign = 'left';
        }
      }

      let lastTime = performance.now();
      function gameLoop(now) {
        const dt = Math.min(0.033, (now - lastTime) / 1000);
        lastTime = now;
        update(dt);
        draw();
        requestAnimationFrame(gameLoop);
      }

      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
