<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Folding</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #101522;
      color: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .game {
      width: min(980px, 100%);
      background: #1b2338;
      border: 1px solid #2f3d61;
      border-radius: 10px;
      padding: 14px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    input[type="number"] {
      width: 110px;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #44537d;
      background: #121a2e;
      color: #fff;
    }
    button {
      border: 1px solid #44537d;
      background: #25345b;
      color: #fff;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
    }
    button:hover {
      background: #30477b;
    }
    canvas {
      width: 100%;
      height: 520px;
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #2f3d61;
    }
    .hint {
      color: #c9d1e3;
      margin: 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="row">
      <label for="nInput">n:</label>
      <input id="nInput" type="number" min="1" max="40" value="8" />
      <button id="generateBtn">Generate</button>
      <button id="leftBtn">⬅️ left</button>
      <button id="rightBtn">➡️ right</button>
      <button id="upBtn">✅⬆️ fold up</button>
      <button id="downBtn">✅⬇️ fold down</button>
      <span id="status"></span>
    </div>
    <p class="hint">Красная линия — верхняя поверхность, чёрная — нижняя. Выбирайте точку сгиба и складывайте правую часть листа, чтобы собирать гармошки.</p>
    <canvas id="canvas" width="940" height="520"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const nInput = document.getElementById('nInput');
    const statusEl = document.getElementById('status');

    const state = {
      n: 8,
      selectedCrease: 0,
      x: [],
      level: [],
      flipped: [],
      animating: false,
      animation: null,
      scruffy: false
    };

    function generate() {
      const n = Math.max(1, Math.min(40, Math.floor(Number(nInput.value) || 1)));
      state.n = n;
      state.selectedCrease = 0;
      state.x = Array.from({ length: n + 2 }, (_, i) => i);
      state.level = Array.from({ length: n + 1 }, () => 0);
      state.flipped = Array.from({ length: n + 1 }, () => false);
      state.animating = false;
      state.animation = null;
      state.scruffy = false;
      draw();
    }

    function intervalOverlap(a1, a2, b1, b2) {
      const left = Math.max(Math.min(a1, a2), Math.min(b1, b2));
      const right = Math.min(Math.max(a1, a2), Math.max(b1, b2));
      return right > left + 0.00001;
    }

    function isIllegalFold(direction) {
      const k = state.selectedCrease;
      const pivot = state.x[k + 1];
      const base = state.level[k];
      const moving = [];
      const fixed = [];

      for (let i = 0; i <= state.n; i++) {
        const seg = { i, x1: state.x[i], x2: state.x[i + 1], level: state.level[i] };
        if (i > k) moving.push(seg);
        else fixed.push(seg);
      }

      for (const mv of moving) {
        const startLevel = mv.level;
        const endLevel = direction === 'up' ? 2 * base - mv.level + 1 : 2 * base - mv.level - 1;
        const pathMinL = Math.min(startLevel, endLevel);
        const pathMaxL = Math.max(startLevel, endLevel);

        const endX1 = 2 * pivot - mv.x1;
        const endX2 = 2 * pivot - mv.x2;
        const sweepMinX = Math.min(mv.x1, mv.x2, endX1, endX2);
        const sweepMaxX = Math.max(mv.x1, mv.x2, endX1, endX2);

        for (const fx of fixed) {
          if (fx.level <= pathMinL + 0.00001 || fx.level >= pathMaxL - 0.00001) continue;
          if (intervalOverlap(sweepMinX, sweepMaxX, fx.x1, fx.x2)) return true;
        }
      }

      const xAfter = [...state.x];
      const levelAfter = [...state.level];
      for (let i = k + 1; i <= state.n + 1; i++) {
        xAfter[i] = 2 * pivot - xAfter[i];
      }
      for (let s = k + 1; s <= state.n; s++) {
        if (direction === 'up') {
          levelAfter[s] = 2 * base - levelAfter[s] + 1;
        } else {
          levelAfter[s] = 2 * base - levelAfter[s] - 1;
        }
      }

      for (let i = 0; i <= state.n; i++) {
        for (let j = i + 1; j <= state.n; j++) {
          if (Math.abs(levelAfter[i] - levelAfter[j]) > 0.00001) continue;
          if (intervalOverlap(xAfter[i], xAfter[i + 1], xAfter[j], xAfter[j + 1])) return true;
        }
      }

      return false;
    }

    function fold(direction) {
      if (state.animating || state.scruffy) return;

      if (isIllegalFold(direction)) {
        state.scruffy = true;
        draw();
        return;
      }

      const k = state.selectedCrease;
      const pivot = state.x[k + 1];
      const base = state.level[k];
      const xBefore = [...state.x];
      const levelBefore = [...state.level];
      const flippedBefore = [...state.flipped];
      const xAfter = [...state.x];
      const levelAfter = [...state.level];
      const flippedAfter = [...state.flipped];

      for (let i = k + 1; i <= state.n + 1; i++) {
        xAfter[i] = 2 * pivot - xAfter[i];
      }

      for (let s = k + 1; s <= state.n; s++) {
        flippedAfter[s] = !flippedAfter[s];
        if (direction === 'up') {
          levelAfter[s] = 2 * base - levelAfter[s] + 1;
        } else {
          levelAfter[s] = 2 * base - levelAfter[s] - 1;
        }
      }

      state.animating = true;
      const duration = 320;
      const start = performance.now();
      state.animation = { k, xBefore, levelBefore, flippedBefore, xAfter, levelAfter, flippedAfter };

      function tick(now) {
        if (!state.animation) return;
        const t = Math.min(1, (now - start) / duration);
        draw(t);
        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          state.x = xAfter;
          state.level = levelAfter;
          state.flipped = flippedAfter;
          state.animating = false;
          state.animation = null;
          draw();
        }
      }

      requestAnimationFrame(tick);
    }

    function worldToScreenX(xValue, minX, maxX, pad) {
      if (Math.abs(maxX - minX) < 0.00001) return canvas.width / 2;
      const t = (xValue - minX) / (maxX - minX);
      return pad + t * (canvas.width - 2 * pad);
    }

    function draw(progress = null) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const anim = state.animation;
      const xView = anim && progress !== null ? anim.xBefore.map((x, idx) => x + (anim.xAfter[idx] - x) * progress) : state.x;
      const levelView = anim && progress !== null ? anim.levelBefore.map((lv, idx) => lv + (anim.levelAfter[idx] - lv) * progress) : state.level;

      const minX = Math.min(...xView);
      const maxX = Math.max(...xView);
      const minLevel = Math.min(...levelView);
      const maxLevel = Math.max(...levelView);

      const pad = 56;
      const baseY = canvas.height / 2 + ((minLevel + maxLevel) * -11) / 2;
      const levelStep = 22;
      const thickness = 6;

      ctx.lineWidth = 1;
      ctx.strokeStyle = '#d6d6d6';
      ctx.beginPath();
      ctx.moveTo(0, canvas.height / 2 + 0.5);
      ctx.lineTo(canvas.width, canvas.height / 2 + 0.5);
      ctx.stroke();

      const isMoving = (idx) => anim && progress !== null && idx > anim.k;

      for (let i = 0; i <= state.n; i++) {
        const x1 = worldToScreenX(xView[i], minX, maxX, pad);
        const x2 = worldToScreenX(xView[i + 1], minX, maxX, pad);
        const y = baseY + levelView[i] * levelStep;
        const moving = isMoving(i);

        const flipNow = moving && progress !== null && progress >= 0.5
          ? !anim.flippedBefore[i]
          : (anim && progress !== null ? anim.flippedBefore[i] : state.flipped[i]);

        const topShift = flipNow ? thickness / 2 : -thickness / 2;
        const bottomShift = -topShift;

        ctx.lineWidth = 3;
        ctx.strokeStyle = moving ? '#ff8a65' : '#ff4d4d';
        ctx.beginPath();
        ctx.moveTo(x1, y + topShift);
        ctx.lineTo(x2, y + topShift);
        ctx.stroke();

        ctx.strokeStyle = moving ? '#555' : '#111';
        ctx.beginPath();
        ctx.moveTo(x1, y + bottomShift);
        ctx.lineTo(x2, y + bottomShift);
        ctx.stroke();

        ctx.fillStyle = '#222';
        ctx.font = '13px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(String(i), (x1 + x2) / 2, y - 10);
      }

      for (let c = 0; c < state.n; c++) {
        const cx = worldToScreenX(xView[c + 1], minX, maxX, pad);
        const cy = baseY + ((levelView[c] + levelView[c + 1]) / 2) * levelStep;
        ctx.fillStyle = c === state.selectedCrease ? '#ffe066' : '#8ea2d3';
        ctx.beginPath();
        ctx.arc(cx, cy, c === state.selectedCrease ? 6 : 4, 0, Math.PI * 2);
        ctx.fill();
      }

      if (state.scruffy) {
        ctx.fillStyle = '#d90429';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SCRUFFY', canvas.width / 2, canvas.height / 2);
        statusEl.textContent = 'SCRUFFY: illegal fold (paper would pass through itself)';
      } else {
        statusEl.textContent = state.animating
          ? `selected crease: ${state.selectedCrease + 1} (folding...)`
          : `selected crease: ${state.selectedCrease + 1}`;
      }
    }

    document.getElementById('generateBtn').addEventListener('click', generate);
    document.getElementById('leftBtn').addEventListener('click', () => {
      if (state.animating || state.scruffy) return;
      state.selectedCrease = Math.max(0, state.selectedCrease - 1);
      draw();
    });
    document.getElementById('rightBtn').addEventListener('click', () => {
      if (state.animating || state.scruffy) return;
      state.selectedCrease = Math.min(state.n - 1, state.selectedCrease + 1);
      draw();
    });
    document.getElementById('upBtn').addEventListener('click', () => fold('up'));
    document.getElementById('downBtn').addEventListener('click', () => fold('down'));

    window.addEventListener('keydown', (e) => {
      if (state.animating || state.scruffy) return;
      if (e.key === 'ArrowLeft') {
        state.selectedCrease = Math.max(0, state.selectedCrease - 1);
        draw();
      } else if (e.key === 'ArrowRight') {
        state.selectedCrease = Math.min(state.n - 1, state.selectedCrease + 1);
        draw();
      } else if (e.key === 'ArrowUp') {
        fold('up');
      } else if (e.key === 'ArrowDown') {
        fold('down');
      }
    });

    generate();
  </script>
</body>
</html>
