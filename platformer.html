<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>White Cube Platformer</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #1e2f4d 0%, #0a1020 100%);
        font-family: Arial, Helvetica, sans-serif;
        color: #eef3ff;
      }

      main {
        text-align: center;
        width: min(940px, 100vw - 16px);
      }

      h1 {
        margin-bottom: 8px;
      }

      a {
        color: #9fd4ff;
      }

      canvas {
        display: block;
        margin-top: 12px;
        border: 2px solid #9ec4ff;
        background: linear-gradient(180deg, #2f4d73 0%, #12253d 65%, #0f1a2f 100%);
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45);
      }

      .controls-panel {
        margin-top: 10px;
        text-align: left;
        background: rgba(10, 17, 30, 0.55);
        border: 1px solid rgba(158, 196, 255, 0.35);
        border-radius: 8px;
        padding: 8px 10px;
      }

      .controls-panel summary {
        cursor: pointer;
        font-weight: 700;
        color: #d7e8ff;
      }

      .controls-panel p {
        margin: 8px 0 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>White Cube Platformer</h1>
      <p><a href="/index.html">← Back to Index</a></p>
      <canvas id="gameCanvas" width="900" height="440"></canvas>
      <details class="controls-panel">
        <summary>Controls & tips</summary>
        <p>Move: ← → or A / D. Jump: Space.</p>
        <p>Shoot: Ctrl (fires in the last movement direction).</p>
        <p>Hold Space for full jump, release early for a shorter jump.</p>
        <p>Avoid red patrol cubes or you respawn at the start.</p>
      </details>
    </main>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      const GRAVITY = 1800;
      const MOVE_SPEED = 320;
      const JUMP_SPEED = 770;
      const BULLET_SPEED = 680;
      const SHOOT_COOLDOWN = 0.16;
      const MAX_AMMO = 3;

      const LEVELS = [
        {
          worldWidth: 2600,
          start: { x: 80, y: 220 },
          platforms: [
            { x: 0, y: 394, w: 300, h: 46 },
            { x: 220, y: 332, w: 150, h: 20 },
            { x: 470, y: 278, w: 160, h: 20 },
            { x: 690, y: 228, w: 170, h: 20 },
            { x: 980, y: 300, w: 180, h: 20 },
            { x: 1240, y: 256, w: 140, h: 20 },
            { x: 1460, y: 214, w: 180, h: 20 },
            { x: 1740, y: 270, w: 200, h: 20 },
            { x: 2060, y: 330, w: 180, h: 20 },
            { x: 2340, y: 394, w: 260, h: 46 },
          ],
          enemies: [
            { x: 280, speed: 95, dir: 1, platform: 1, leftPad: 8, rightPad: 8 },
            { x: 520, speed: 115, dir: -1, platform: 2, leftPad: 10, rightPad: 10 },
            { x: 760, speed: 100, dir: 1, platform: 3, leftPad: 8, rightPad: 8 },
            { x: 1520, speed: 120, dir: -1, platform: 6, leftPad: 10, rightPad: 10 },
            { x: 2115, speed: 105, dir: 1, platform: 8, leftPad: 8, rightPad: 8 },
          ],
        },
        {
          worldWidth: 2550,
          start: { x: 80, y: 200 },
          platforms: [
            { x: 0, y: 394, w: 260, h: 46 },
            { x: 230, y: 344, w: 120, h: 20 },
            { x: 390, y: 292, w: 140, h: 20 },
            { x: 590, y: 250, w: 120, h: 20 },
            { x: 760, y: 210, w: 120, h: 20 },
            { x: 940, y: 252, w: 140, h: 20 },
            { x: 1140, y: 300, w: 150, h: 20 },
            { x: 1360, y: 260, w: 160, h: 20 },
            { x: 1600, y: 222, w: 150, h: 20 },
            { x: 1820, y: 282, w: 180, h: 20 },
            { x: 2100, y: 340, w: 180, h: 20 },
            { x: 2290, y: 394, w: 260, h: 46 },
          ],
          enemies: [
            { x: 260, speed: 100, dir: 1, platform: 1, leftPad: 6, rightPad: 6 },
            { x: 420, speed: 130, dir: -1, platform: 2, leftPad: 8, rightPad: 8 },
            { x: 810, speed: 112, dir: 1, platform: 4, leftPad: 8, rightPad: 8 },
            { x: 1420, speed: 125, dir: -1, platform: 7, leftPad: 8, rightPad: 8 },
            { x: 1890, speed: 120, dir: 1, platform: 9, leftPad: 8, rightPad: 8 },
            { x: 2140, speed: 108, dir: -1, platform: 10, leftPad: 8, rightPad: 8 },
          ],
        },
        {
          worldWidth: 2700,
          start: { x: 80, y: 210 },
          platforms: [
            { x: 0, y: 394, w: 300, h: 46 },
            { x: 250, y: 320, w: 120, h: 20 },
            { x: 420, y: 260, w: 110, h: 20 },
            { x: 590, y: 210, w: 110, h: 20 },
            { x: 760, y: 260, w: 110, h: 20 },
            { x: 930, y: 320, w: 130, h: 20 },
            { x: 1150, y: 270, w: 130, h: 20 },
            { x: 1340, y: 220, w: 110, h: 20 },
            { x: 1510, y: 180, w: 110, h: 20 },
            { x: 1690, y: 235, w: 130, h: 20 },
            { x: 1880, y: 290, w: 150, h: 20 },
            { x: 2100, y: 340, w: 160, h: 20 },
            { x: 2360, y: 298, w: 160, h: 20 },
            { x: 2510, y: 394, w: 190, h: 46 },
          ],
          enemies: [
            { x: 280, speed: 108, dir: 1, platform: 1, leftPad: 8, rightPad: 8 },
            { x: 445, speed: 124, dir: -1, platform: 2, leftPad: 8, rightPad: 8 },
            { x: 610, speed: 126, dir: 1, platform: 3, leftPad: 8, rightPad: 8 },
            { x: 960, speed: 135, dir: -1, platform: 5, leftPad: 8, rightPad: 8 },
            { x: 1370, speed: 120, dir: 1, platform: 7, leftPad: 8, rightPad: 8 },
            { x: 1910, speed: 110, dir: -1, platform: 10, leftPad: 8, rightPad: 8 },
            { x: 2400, speed: 132, dir: 1, platform: 12, leftPad: 8, rightPad: 8 },
          ],
        },
      ];

      const keys = {
        left: false,
        right: false,
        jump: false,
      };

      const player = {
        x: 80,
        y: 220,
        w: 28,
        h: 28,
        vx: 0,
        vy: 0,
        onGround: false,
        facing: 1,
      };

      const bullets = [];

      let currentLevelIndex = 0;
      let worldWidth = LEVELS[0].worldWidth;
      let platforms = [];
      let enemies = [];
      let finishPlatform = null;
      let cameraX = 0;
      let shootCooldownLeft = 0;
      let levelComplete = false;
      let gameComplete = false;
      let ammoLeft = MAX_AMMO;

      function loadLevel(index) {
        const level = LEVELS[index];

        worldWidth = level.worldWidth;
        platforms = level.platforms.map((platform) => ({ ...platform }));
        finishPlatform = platforms[platforms.length - 1];
        enemies = level.enemies.map((enemy) => ({ ...enemy, w: 24, h: 24 }));

        enemies.forEach((enemy) => {
          const patrolPlatform = platforms[enemy.platform];
          enemy.minX = patrolPlatform.x + enemy.leftPad;
          enemy.maxX = patrolPlatform.x + patrolPlatform.w - enemy.w - enemy.rightPad;
          enemy.x = Math.max(enemy.minX, Math.min(enemy.maxX, enemy.x));
          enemy.y = patrolPlatform.y - enemy.h;
        });

        player.x = level.start.x;
        player.y = level.start.y;
        player.vx = 0;
        player.vy = 0;
        player.onGround = false;
        player.facing = 1;

        keys.left = false;
        keys.right = false;
        keys.jump = false;

        bullets.length = 0;
        shootCooldownLeft = 0;
        levelComplete = false;
        gameComplete = false;
        ammoLeft = MAX_AMMO;
        cameraX = 0;
      }

      function resetPlayer() {
        if (levelComplete) return;

        const level = LEVELS[currentLevelIndex];
        player.x = level.start.x;
        player.y = level.start.y;
        player.vx = 0;
        player.vy = 0;
        bullets.length = 0;
      }

      function tryAdvanceLevel() {
        if (!levelComplete) return;

        if (currentLevelIndex < LEVELS.length - 1) {
          currentLevelIndex += 1;
          loadLevel(currentLevelIndex);
          return;
        }

        gameComplete = true;
      }

      function restartFromBeginning() {
        currentLevelIndex = 0;
        loadLevel(currentLevelIndex);
      }

      function keyState(key, isDown) {
        if (key === 'ArrowLeft' || key.toLowerCase() === 'a') {
          keys.left = isDown;
          if (isDown) player.facing = -1;
        }

        if (key === 'ArrowRight' || key.toLowerCase() === 'd') {
          keys.right = isDown;
          if (isDown) player.facing = 1;
        }

        if (key === ' ') {
          if (isDown) {
            if (!keys.jump && player.onGround && !levelComplete) {
              player.vy = -JUMP_SPEED;
              player.onGround = false;
            }
            keys.jump = true;
          } else {
            if (keys.jump && player.vy < 0) {
              player.vy *= 0.5;
            }
            keys.jump = false;
          }
        }
      }

      window.addEventListener('keydown', (event) => {
        const normalizedKey = event.key.toLowerCase();
        if (['arrowleft', 'arrowright', ' ', 'control', 'a', 'd'].includes(normalizedKey) || event.key === ' ') {
          event.preventDefault();
        }

        if (event.key === ' ' && !event.repeat && levelComplete) {
          if (gameComplete) {
            restartFromBeginning();
          } else {
            tryAdvanceLevel();
          }
          return;
        }

        if ((event.key === 'Control' || normalizedKey === 'control') && !event.repeat) {
          tryShoot();
        }

        keyState(event.key, true);
      });

      window.addEventListener('keyup', (event) => {
        keyState(event.key, false);
      });

      function intersects(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function tryShoot() {
        if (levelComplete || shootCooldownLeft > 0 || ammoLeft <= 0) return;

        const bulletW = 10;
        const bulletH = 4;
        const bulletX = player.facing > 0 ? player.x + player.w : player.x - bulletW;
        const bulletY = player.y + player.h / 2 - bulletH / 2;

        bullets.push({
          x: bulletX,
          y: bulletY,
          w: bulletW,
          h: bulletH,
          vx: BULLET_SPEED * player.facing,
        });

        shootCooldownLeft = SHOOT_COOLDOWN;
        ammoLeft -= 1;
      }

      function update(dt) {
        if (levelComplete) return;

        shootCooldownLeft = Math.max(0, shootCooldownLeft - dt);

        player.vx = 0;
        if (keys.left) player.vx -= MOVE_SPEED;
        if (keys.right) player.vx += MOVE_SPEED;

        player.x += player.vx * dt;
        player.x = Math.max(0, Math.min(worldWidth - player.w, player.x));

        player.vy += GRAVITY * dt;
        player.y += player.vy * dt;

        player.onGround = false;

        for (const platform of platforms) {
          if (!intersects(player, platform)) continue;

          const prevBottom = player.y - player.vy * dt + player.h;
          const prevTop = player.y - player.vy * dt;
          const prevRight = player.x - player.vx * dt + player.w;
          const prevLeft = player.x - player.vx * dt;

          if (prevBottom <= platform.y) {
            player.y = platform.y - player.h;
            player.vy = 0;
            player.onGround = true;

            if (platform === finishPlatform) {
              levelComplete = true;
              keys.left = false;
              keys.right = false;
              keys.jump = false;
            }
          } else if (prevTop >= platform.y + platform.h) {
            player.y = platform.y + platform.h;
            player.vy = 0;
          } else if (prevRight <= platform.x) {
            player.x = platform.x - player.w;
          } else if (prevLeft >= platform.x + platform.w) {
            player.x = platform.x + platform.w;
          }
        }

        if (player.y > canvas.height + 150) {
          resetPlayer();
        }

        for (let bulletIndex = bullets.length - 1; bulletIndex >= 0; bulletIndex -= 1) {
          const bullet = bullets[bulletIndex];
          bullet.x += bullet.vx * dt;

          if (bullet.x + bullet.w < 0 || bullet.x > worldWidth) {
            bullets.splice(bulletIndex, 1);
          }
        }

        for (let enemyIndex = enemies.length - 1; enemyIndex >= 0; enemyIndex -= 1) {
          const enemy = enemies[enemyIndex];
          enemy.x += enemy.speed * enemy.dir * dt;

          if (enemy.x <= enemy.minX) {
            enemy.x = enemy.minX;
            enemy.dir = 1;
          } else if (enemy.x >= enemy.maxX) {
            enemy.x = enemy.maxX;
            enemy.dir = -1;
          }

          if (intersects(player, enemy)) {
            resetPlayer();
            break;
          }

          for (let bulletIndex = bullets.length - 1; bulletIndex >= 0; bulletIndex -= 1) {
            if (intersects(bullets[bulletIndex], enemy)) {
              bullets.splice(bulletIndex, 1);
              enemies.splice(enemyIndex, 1);
              break;
            }
          }
        }

        const targetCamera = player.x - canvas.width * 0.35;
        cameraX = Math.max(0, Math.min(worldWidth - canvas.width, targetCamera));
      }

      function drawHud() {
        ctx.fillStyle = '#d9e6ff';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`Level ${currentLevelIndex + 1}/${LEVELS.length}`, 16, 28);

        ctx.textAlign = 'right';
        ctx.fillText(`Ammo: ${ammoLeft}/${MAX_AMMO}`, canvas.width - 16, 28);

        ctx.textAlign = 'left';
        ctx.font = '16px Arial';
        ctx.fillText('Reach the final platform.', 16, 52);
      }

      function drawLevelCompleteOverlay() {
        ctx.fillStyle = 'rgba(7, 14, 24, 0.62)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#d8f7a1';
        ctx.font = 'bold 44px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Level Complete!', canvas.width / 2, canvas.height / 2 - 8);

        ctx.font = '20px Arial';
        ctx.fillStyle = '#eef7ff';
        if (gameComplete) {
          ctx.fillText('All levels done. Press Space to restart.', canvas.width / 2, canvas.height / 2 + 34);
        } else {
          ctx.fillText('Press Space to start next level.', canvas.width / 2, canvas.height / 2 + 34);
        }

        ctx.textAlign = 'left';
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-cameraX, 0);

        ctx.fillStyle = '#4f6c93';
        for (let i = 0; i < worldWidth; i += 80) {
          ctx.fillRect(i, 0, 2, canvas.height);
        }

        ctx.fillStyle = '#7089ad';
        platforms.forEach((platform) => {
          ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
        });

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(player.x, player.y, player.w, player.h);

        ctx.fillStyle = '#ffe66d';
        bullets.forEach((bullet) => {
          ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
        });

        ctx.fillStyle = '#e63946';
        enemies.forEach((enemy) => {
          ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
        });

        ctx.restore();

        drawHud();

        if (levelComplete) {
          drawLevelCompleteOverlay();
        }
      }

      let previousTime = performance.now();

      function gameLoop(time) {
        const dt = Math.min((time - previousTime) / 1000, 1 / 30);
        previousTime = time;

        update(dt);
        draw();

        requestAnimationFrame(gameLoop);
      }

      loadLevel(currentLevelIndex);
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
