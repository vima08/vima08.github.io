<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroids</title>
    <style>
      body {
        margin: 0;
        background: #000;
        color: #fff;
        text-align: center;
        font-family: sans-serif;
      }

      canvas {
        display: block;
        margin: 10px auto;
        border: 1px solid #555;
        background: #020510;
      }
    </style>
  </head>
  <body>
    <h1>Asteroids</h1>
    <p>Arrows to rotate/thrust, Space to shoot.</p>
    <canvas id="gameCanvas" width="700" height="450"></canvas>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      let ship = { x: 350, y: 225, angle: 0, vx: 0, vy: 0 };
      const keys = {};
      let shots = [];
      let asteroids = Array.from({ length: 6 }, createAsteroid);
      let score = 0;
      const explosionColors = ['#ffd400', '#ff3b2f', '#ff8c1a'];

      function createSmallAsteroids(parentA, parentB) {
        const midpointX = (parentA.x + parentB.x) / 2;
        const midpointY = (parentA.y + parentB.y) / 2;
        const totalRadius = parentA.radius + parentB.radius;
        const childRadius = Math.max(8, totalRadius / 5);
        const baseSpeed = Math.max(1.1, (Math.hypot(parentA.vx, parentA.vy) + Math.hypot(parentB.vx, parentB.vy)) / 2);

        return Array.from({ length: 4 }, (_, index) => {
          const angle = (Math.PI / 2) * index + Math.random() * 0.35;
          const spread = 6 + Math.random() * 10;
          const speed = baseSpeed + Math.random() * 1.5;
          return {
            x: (midpointX + Math.cos(angle) * spread + canvas.width) % canvas.width,
            y: (midpointY + Math.sin(angle) * spread + canvas.height) % canvas.height,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            radius: childRadius * (0.8 + Math.random() * 0.4),
            state: 'normal',
            collapseTimer: 0,
          };
        });
      }

      function createAsteroid() {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const edgeInset = 2;
        const minSpawnDistanceFromShip = 90;

        const randomEdgePosition = () => {
          const edge = Math.floor(Math.random() * 4);
          if (edge === 0) return { x: Math.random() * canvas.width, y: edgeInset }; // top
          if (edge === 1) return { x: canvas.width - edgeInset, y: Math.random() * canvas.height }; // right
          if (edge === 2) return { x: Math.random() * canvas.width, y: canvas.height - edgeInset }; // bottom
          return { x: edgeInset, y: Math.random() * canvas.height }; // left
        };

        let asteroid;
        for (let attempt = 0; attempt < 40; attempt += 1) {
          const radius = 20 + Math.random() * 20;
          const { x, y } = randomEdgePosition();
          const angleToCenter = Math.atan2(centerY - y, centerX - x);
          const speed = 0.6 + Math.random() * 1.1;
          const angleOffset = (Math.random() - 0.5) * 0.45;

          asteroid = {
            x,
            y,
            vx: Math.cos(angleToCenter + angleOffset) * speed,
            vy: Math.sin(angleToCenter + angleOffset) * speed,
            radius,
            state: 'normal',
            collapseTimer: 0,
          };

          if (Math.hypot(asteroid.x - ship.x, asteroid.y - ship.y) > asteroid.radius + minSpawnDistanceFromShip) {
            return asteroid;
          }
        }

        // Fallback if we somehow cannot find a safe spawn quickly.
        return {
          ...asteroid,
          x: centerX,
          y: edgeInset,
          vx: 0.5,
          vy: 0.8,
          state: 'normal',
          collapseTimer: 0,
        };
      }

      window.addEventListener('keydown', (event) => {
        keys[event.code] = true;
      });

      window.addEventListener('keyup', (event) => {
        keys[event.code] = false;
      });

      function update() {
        if (keys.ArrowLeft) ship.angle -= 0.08;
        if (keys.ArrowRight) ship.angle += 0.08;

        if (keys.ArrowUp) {
          ship.vx += Math.cos(ship.angle) * 0.1;
          ship.vy += Math.sin(ship.angle) * 0.1;
        }

        if (keys.Space && Math.random() < 0.25) {
          shots.push({
            x: ship.x,
            y: ship.y,
            vx: Math.cos(ship.angle) * 6,
            vy: Math.sin(ship.angle) * 6,
            life: 60,
          });
        }

        ship.x = (ship.x + ship.vx + canvas.width) % canvas.width;
        ship.y = (ship.y + ship.vy + canvas.height) % canvas.height;
        ship.vx *= 0.99;
        ship.vy *= 0.99;

        shots.forEach((shot) => {
          shot.x = (shot.x + shot.vx + canvas.width) % canvas.width;
          shot.y = (shot.y + shot.vy + canvas.height) % canvas.height;
          shot.life -= 1;
        });
        shots = shots.filter((shot) => shot.life > 0);

        asteroids.forEach((asteroid) => {
          asteroid.x = (asteroid.x + asteroid.vx + canvas.width) % canvas.width;
          asteroid.y = (asteroid.y + asteroid.vy + canvas.height) % canvas.height;
        });

        const asteroidCollisionIndexes = new Set();
        const asteroidFragments = [];
        for (let i = 0; i < asteroids.length; i += 1) {
          for (let j = i + 1; j < asteroids.length; j += 1) {
            const a = asteroids[i];
            const b = asteroids[j];
            if (a.state !== 'normal' || b.state !== 'normal') continue;
            if (Math.hypot(a.x - b.x, a.y - b.y) < a.radius + b.radius) {
              asteroidCollisionIndexes.add(i);
              asteroidCollisionIndexes.add(j);
              asteroidFragments.push(...createSmallAsteroids(a, b));
            }
          }
        }

        asteroids = asteroids.filter((asteroid, index) => {
          if (asteroidCollisionIndexes.has(index)) {
            return false;
          }

          for (const shot of shots) {
            if (asteroid.state === 'normal' && Math.hypot(asteroid.x - shot.x, asteroid.y - shot.y) < asteroid.radius) {
              shot.life = 0;
              score += 10;
              asteroid.state = 'collapsing';
              asteroid.collapseTimer = 18;
              asteroid.vx *= 0.85;
              asteroid.vy *= 0.85;
              break;
            }
          }

          if (asteroid.state === 'collapsing') {
            asteroid.collapseTimer -= 1;
            asteroid.radius *= 0.88;
            if (asteroid.collapseTimer <= 0 || asteroid.radius < 2) {
              return false;
            }
          }

          if (Math.hypot(asteroid.x - ship.x, asteroid.y - ship.y) < asteroid.radius + 10) {
            score = 0;
            ship = { x: 350, y: 225, angle: 0, vx: 0, vy: 0 };
          }

          return true;
        });

        asteroids.push(...asteroidFragments);
        if (asteroids.length > 24) {
          asteroids = asteroids.slice(asteroids.length - 24);
        }

        while (asteroids.length < 6) {
          asteroids.push(createAsteroid());
        }
      }

      function draw() {
        ctx.fillStyle = '#020510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Ship
        ctx.strokeStyle = '#fff';
        ctx.save();
        ctx.translate(ship.x, ship.y);
        ctx.rotate(ship.angle);
        ctx.beginPath();
        ctx.moveTo(12, 0);
        ctx.lineTo(-10, 8);
        ctx.lineTo(-6, 0);
        ctx.lineTo(-10, -8);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();

        // Shots
        ctx.fillStyle = '#fff';
        shots.forEach((shot) => {
          ctx.fillRect(shot.x - 1, shot.y - 1, 3, 3);
        });

        // Asteroids
        asteroids.forEach((asteroid) => {
          if (asteroid.state === 'collapsing') {
            const colorIndex = asteroid.collapseTimer % explosionColors.length;
            ctx.fillStyle = explosionColors[colorIndex];
            ctx.strokeStyle = '#fff2ae';
          } else {
            ctx.fillStyle = '#7b4a1d';
            ctx.strokeStyle = '#a97a4f';
          }
          ctx.beginPath();
          ctx.arc(asteroid.x, asteroid.y, asteroid.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        });

        ctx.fillStyle = '#fff';
        ctx.fillText(`Score: ${score}`, 10, 18);
      }

      function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
      }

      gameLoop();
    </script>
  </body>
</html>
